<!DOCTYPE html>
<html>
<head>
  <title>TitanSub Systems</title>
  <style>
    body{
      font-family:'Segoe UI',sans-serif;
      margin:0;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      flex-direction:column;
    }

    header{
      background:linear-gradient(to right,#141e30,#243b55);
      color:white;
      padding:20px;
      text-align:center;
      width:100%;
    }

    .container{
      background:white;
      padding:25px;
      border-radius:15px;
      width:450px;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
      text-align:center;
    }

    input, select{
      padding:10px;
      margin:8px 0;
      width:90%;
      border-radius:5px;
      border:1px solid #ccc;
      font-size:14px;
    }

    button{
      padding:10px 18px;
      margin:8px 0;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      transition:.3s;
      font-size:14px;
    }

    button:hover{
      background:#0056b3;
      transform:scale(1.05);
    }

    .hidden{display:none;}

    .plans{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
      margin-top:15px;
    }

    .plan-card{
      background:white;
      padding:15px;
      width:120px;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .plan-card h3{
      margin:5px 0;
    }

    .plan-card p{
      font-size:12px;
      margin:2px 0;
    }

    .dashboard ul{
      list-style:none;
      padding:0;
    }

    .dashboard li{
      background:#f4f6f8;
      margin:6px 0;
      padding:8px;
      border-radius:6px;
      font-size:14px;
    }

    footer{
      margin-top:20px;
      color:white;
    }

  </style>
</head>
<body>

<header>
  <h1>TitanSub Systems</h1>
</header>

<div class="container">

  <!-- REGISTER -->
  <div id="registerSection">
    <h2>Register</h2>
    <input type="text" id="regName" placeholder="Name"><br>
    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="password" id="regPassword" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <p>Already have account? <button onclick="showLogin()">Login</button></p>
  </div>

  <!-- LOGIN -->
  <div id="loginSection" class="hidden">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p>Don't have account? <button onclick="showRegister()">Register</button></p>
  </div>

  <!-- PLAN -->
  <div id="planSection" class="hidden">
    <h2>Choose Your Plan</h2>
    <div class="plans">
      <div class="plan-card">
        <h3>Basic</h3>
        <p>₹199 / Month</p>
        <button onclick="subscribe('Basic',199)">Subscribe</button>
      </div>
      <div class="plan-card">
        <h3>Standard</h3>
        <p>₹499 / Month</p>
        <button onclick="subscribe('Standard',499)">Subscribe</button>
      </div>
      <div class="plan-card">
        <h3>Premium</h3>
        <p>₹999 / Month</p>
        <button onclick="subscribe('Premium',999)">Subscribe</button>
      </div>
    </div>
    <br>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardSection" class="hidden">
    <h2>Dashboard</h2>
    <p id="welcome"></p>
    <div class="dashboard">
      <h3>All Subscribed Users</h3>
      <ul id="subList"></ul>
    </div>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<footer>
  © 2026 TitanSub Systems
</footer>

<script>
  // Auto-login
  window.onload=function(){
    let currentUser = localStorage.getItem("currentUser");
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    if(currentUser && subscriptions.length>0){ showDashboard(); }
  }

  function showLogin(){
    registerSection.classList.add("hidden");
    loginSection.classList.remove("hidden");
  }

  function showRegister(){
    loginSection.classList.add("hidden");
    registerSection.classList.remove("hidden");
  }

  function register(){
    let name = regName.value.trim();
    let email = regEmail.value.trim();
    let password = regPassword.value.trim();
    if(!name||!email||!password){ alert("Fill all fields"); return; }

    let users = JSON.parse(localStorage.getItem("users")) || [];
    if(users.find(u=>u.email===email)){ alert("Email already registered"); return; }

    users.push({name,email,password});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration Successful");
    showLogin();
  }

  function login(){
    let email=loginEmail.value;
    let password=loginPassword.value;
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let user = users.find(u=>u.email===email && u.password===password);

    if(user){
      localStorage.setItem("currentUser", JSON.stringify(user));
      alert("Login Successful");
      loginSection.classList.add("hidden");
      planSection.classList.remove("hidden");
    } else { alert("Invalid login"); }
  }

  function subscribe(plan,price){
    let expiry = new Date();
    expiry.setMonth(expiry.getMonth()+1);

    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    subscriptions.push({name:currentUser.name,email:currentUser.email,plan,price,expiry:expiry.toISOString()});
    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));

    alert("Subscribed to "+plan);
    showDashboard();
  }

  function showDashboard(){
    registerSection.classList.add("hidden");
    loginSection.classList.add("hidden");
    planSection.classList.add("hidden");
    dashboardSection.classList.remove("hidden");

    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    welcome.innerText = "Welcome, "+currentUser.name;

    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    let subHtml = "";
    subscriptions.forEach(s=>{
      subHtml += `<li>${s.name} - ${s.plan} - ₹${s.price} - Expiry: ${new Date(s.expiry).toDateString()}</li>`;
    });
    subList.innerHTML = subHtml;
  }

  function logout(){
    localStorage.removeItem("currentUser");
    dashboardSection.classList.add("hidden");
    planSection.classList.add("hidden");
    loginSection.classList.remove("hidden");
  }

</script>

</body>
</html>
