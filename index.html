<!DOCTYPE html>
<html>
<head>
  <title>TitanSub Systems</title>
  <style>
    body{
      font-family:'Segoe UI',sans-serif;
      margin:0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      flex-direction:column;
      color:white;
    }

    header{
      background: linear-gradient(to right,#3b1f70,#5a2fae);
      padding:15px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
      width:100%;
    }

    .container{
      padding:15px;
      text-align:center;
      width:350px;
      margin:20px auto;
      background: rgba(255,255,255,0.1);
      border-radius:10px;
    }

    input, select{
      padding:10px;
      margin:8px 0;
      width:90%;
      border-radius:5px;
      border:none;
      font-size:14px;
    }

    button{
      padding:10px 18px;
      margin:8px 0;
      background:#6c5ce7;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      transition:.3s;
      font-size:14px;
    }

    button:hover{
      background:#341f97;
      transform:scale(1.05);
    }

    .hidden{display:none;}

    .plans{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .plan-card{
      background:white;
      color:#333;
      padding:10px;
      width:110px;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
      transition:.3s;
      font-size:12px;
    }

    .plan-card:hover{
      transform:translateY(-5px);
    }

    .plan-card img{
      width:40px;
      margin-bottom:5px;
    }

    .dashboard{
      background: rgba(255,255,255,0.9);
      color:#333;
      padding:10px;
      border-radius:10px;
      margin-top:10px;
      font-size:12px;
      max-height:200px;
      overflow-y:auto;
      text-align:left;
    }

    .dashboard ul{
      list-style:none;
      padding:0;
    }

    .dashboard li{
      background:#f4f6f8;
      margin:5px 0;
      padding:5px;
      border-radius:5px;
      font-size:12px;
      display:flex;
      justify-content: space-between;
      align-items:center;
    }

    .small-btn{
      padding:4px 6px;
      font-size:10px;
      margin-left:3px;
    }

    footer{
      margin-top:10px;
      color:white;
      text-align:center;
      padding:5px 0;
      font-size:12px;
    }

    h2{
      margin-bottom:10px;
    }

    .hero{
      font-size:16px;
      font-weight:bold;
      text-shadow:1px 1px 2px #000;
      margin-bottom:10px;
    }
  </style>
</head>
<body>

<header>TitanSub Systems</header>

<div class="container">

  <div class="hero">💼 Manage Subscriptions Easily 💳</div>

  <!-- REGISTER -->
  <div id="registerSection">
    <h2>Register 📝</h2>
    <input type="text" id="regName" placeholder="Name"><br>
    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="password" id="regPassword" placeholder="Password"><br>
    <button onclick="register()">Register ✅</button>
    <p>Already have account? <button onclick="showLogin()">Login 🔑</button></p>
  </div>

  <!-- LOGIN -->
  <div id="loginSection" class="hidden">
    <h2>Login 🔑</h2>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()">Login ✅</button>
    <p>Don't have account? <button onclick="showRegister()">Register 📝</button></p>
  </div>

  <!-- PLANS -->
  <div id="planSection" class="hidden">
    <h2>Choose Plan 💳</h2>
    <select id="paymentMethod">
      <option>Credit Card</option>
      <option>UPI</option>
      <option>PayPal</option>
    </select>

    <div class="plans">
      <div class="plan-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <h3>Basic</h3>
        <p>₹199 / Month</p>
        <p>5 Products</p>
        <button onclick="subscribe('Basic',199)">Subscribe</button>
      </div>
      <div class="plan-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
        <h3>Standard</h3>
        <p>₹499 / Month</p>
        <p>20 Products</p>
        <button onclick="subscribe('Standard',499)">Subscribe</button>
      </div>
      <div class="plan-card">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
        <h3>Premium</h3>
        <p>₹999 / Month</p>
        <p>Unlimited Products</p>
        <button onclick="subscribe('Premium',999)">Subscribe</button>
      </div>
    </div>
    <br>
    <button onclick="logout()">Logout 🔒</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardSection" class="hidden">
    <p id="welcome"></p>
    <div class="dashboard">
      <ul id="subList"></ul>
    </div>
    <button onclick="logout()">Logout 🔒</button>
  </div>

</div>

<footer>© 2026 TitanSub Systems | Made by Sindhu 👩‍💻</footer>

<script>
  window.onload = function(){
    let currentUser = localStorage.getItem("currentUser");
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    if(currentUser && subscriptions.length>0){ showDashboard(); }
  }

  function showLogin(){
    registerSection.classList.add("hidden");
    loginSection.classList.remove("hidden");
  }

  function showRegister(){
    loginSection.classList.add("hidden");
    registerSection.classList.remove("hidden");
  }

  function register(){
    let name = regName.value.trim();
    let email = regEmail.value.trim();
    let password = regPassword.value.trim();
    if(!name||!email||!password){ alert("Fill all fields ❌"); return; }

    let users = JSON.parse(localStorage.getItem("users")) || [];
    if(users.find(u=>u.email===email)){ alert("Email already registered ❌"); return; }

    users.push({name,email,password});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration Successful ✅");
    showLogin();
  }

  function login(){
    let email = loginEmail.value;
    let password = loginPassword.value;
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let user = users.find(u=>u.email===email && u.password===password);

    if(user){
      localStorage.setItem("currentUser", JSON.stringify(user));
      alert("Login Successful ✅");
      loginSection.classList.add("hidden");
      planSection.classList.remove("hidden");
    } else { alert("Invalid login ❌"); }
  }

  function subscribe(plan,price){
    let method = document.getElementById("paymentMethod").value;
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];

    let expiry = new Date();
    expiry.setMonth(expiry.getMonth()+1);

    subscriptions.push({
      name: currentUser.name,
      email: currentUser.email,
      plan,
      price,
      paymentMethod: method,
      isPaid: true, // simulate payment success
      expiry: expiry.toISOString()
    });

    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
    alert(`Subscribed to ${plan} 💳`);
    showDashboard();
  }

  function showDashboard(){
    registerSection.classList.add("hidden");
    loginSection.classList.add("hidden");
    planSection.classList.add("hidden");
    dashboardSection.classList.remove("hidden");

    let currentUser = JSON.parse(localStorage.getItem("currentUser"));
    welcome.innerText = `Welcome, ${currentUser.name} 👋`;

    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    let subHtml = "";
    subscriptions.forEach((s,index)=>{
      let paidEmoji = s.isPaid ? "✅" : "❌";
      subHtml += `<li>
        <span>${s.name} - ${s.email} - ${s.plan} - ₹${s.price} - ${paidEmoji} Paid - Expiry: ${new Date(s.expiry).toDateString()}</span>
        <span>
          <button class="small-btn" onclick="cancel(${index})">Cancel ❌</button>
          <button class="small-btn" onclick="upgrade(${index})">Upgrade ⬆️</button>
          <button class="small-btn" onclick="downgrade(${index})">Downgrade ⬇️</button>
        </span>
      </li>`;
    });
    subList.innerHTML = subHtml;
  }

  function cancel(idx){
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    subscriptions[idx].plan = "Canceled";
    subscriptions[idx].isPaid = false;
    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
    showDashboard();
  }

  function upgrade(idx){
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    if(subscriptions[idx].plan === "Basic") subscriptions[idx].plan = "Standard";
    else if(subscriptions[idx].plan === "Standard") subscriptions[idx].plan = "Premium";
    subscriptions[idx].isPaid = true;
    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
    showDashboard();
  }

  function downgrade(idx){
    let subscriptions = JSON.parse(localStorage.getItem("subscriptions")) || [];
    if(subscriptions[idx].plan === "Premium") subscriptions[idx].plan = "Standard";
    else if(subscriptions[idx].plan === "Standard") subscriptions[idx].plan = "Basic";
    subscriptions[idx].isPaid = true;
    localStorage.setItem("subscriptions", JSON.stringify(subscriptions));
    showDashboard();
  }

  function logout(){
    localStorage.removeItem("currentUser");
    dashboardSection.classList.add("hidden");
    planSection.classList.add("hidden");
    loginSection.classList.remove("hidden");
  }
</script>

</body>
  </html>
